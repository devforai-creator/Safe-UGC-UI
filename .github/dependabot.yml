version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      security-updates:
        applies-to: 'security-updates'
        patterns:
          - '*'
      test-toolchain:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - 'jsdom'
      demo-vite:
        patterns:
          - 'vite'
          - '@vitejs/*'
      react-types:
        patterns:
          - '@types/react'
          - '@types/react-dom'
      node-types:
        patterns:
          - '@types/node'
      schema-runtime:
        patterns:
          - 'zod'
      build-tooling:
        patterns:
          - 'typescript'
          - 'tsup'
    open-pull-requests-limit: 10
