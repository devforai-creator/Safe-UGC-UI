name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Keep the publish runner on Node 24 for npm trusted publishing.
          # Local development and CI validation remain on the documented 20.19.0 baseline.
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release baseline gate
        run: pnpm release:check

      - name: Publish public packages
        run: pnpm -r publish --access public --no-git-checks
